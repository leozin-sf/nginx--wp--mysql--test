events {
    worker_connections 1024;
}

http {

    # Upstream: os 3 containers WordPress (round-robin por padrão)
    upstream wordpress_cluster {
        server wordpress1:80;
        server wordpress2:80;
        server wordpress3:80;
    }

    server {
        listen 80;
        server_name _;

        # Cabeçalhos para o WordPress saber o IP real do cliente
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        location / {
            proxy_pass http://wordpress_cluster;

            # Timeouts
            proxy_connect_timeout 30s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }
    }
}
