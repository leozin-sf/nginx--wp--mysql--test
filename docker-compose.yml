services:

  # --- Banco de dados MySQL ---
  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wpuser
      MYSQL_PASSWORD: wppassword
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - wp_network

  # --- WordPress 1 ---
  wordpress1:
    image: wordpress:latest
    container_name: wordpress1
    restart: always
    depends_on:
      - mysql
    environment:
      WORDPRESS_DB_HOST: mysql:3306
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DB_USER: wpuser
      WORDPRESS_DB_PASSWORD: wppassword
    volumes:
      - wp_data:/var/www/html
    networks:
      - wp_network

  # --- WordPress 2 ---
  wordpress2:
    image: wordpress:latest
    container_name: wordpress2
    restart: always
    depends_on:
      - mysql
    environment:
      WORDPRESS_DB_HOST: mysql:3306
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DB_USER: wpuser
      WORDPRESS_DB_PASSWORD: wppassword
    volumes:
      - wp_data:/var/www/html
    networks:
      - wp_network

  # --- WordPress 3 ---
  wordpress3:
    image: wordpress:latest
    container_name: wordpress3
    restart: always
    depends_on:
      - mysql
    environment:
      WORDPRESS_DB_HOST: mysql:3306
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DB_USER: wpuser
      WORDPRESS_DB_PASSWORD: wppassword
    volumes:
      - wp_data:/var/www/html
    networks:
      - wp_network

  # --- Nginx (Load Balancer) ---
  # O arquivo nginx.conf é montado a partir de ./nginx.conf
  # Para variar o número de instâncias, basta substituir esse arquivo
  # antes de subir o nginx (ver scripts/run_tests.sh).
  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: always
    depends_on:
      - wordpress1
      - wordpress2
      - wordpress3
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - wp_network

  # --- Locust (load generator) ---
  # Usado em modo headless via docker compose run, controlado pelo script.
  locust:
    image: locustio/locust:2.31.5
    container_name: locust
    depends_on:
      - nginx
    ports:
      - "8089:8089"
    volumes:
      - ./locust:/mnt/locust
      - ./resultados:/mnt/resultados
    networks:
      - wp_network

volumes:
  mysql_data:
  wp_data:

networks:
  wp_network:
    driver: bridge
